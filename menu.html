<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Teas & C's</title>
    <meta name="description" content="Terms and conditions for Teas & C's tea and coffee shop in London.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@300;400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="brand/Favicon.png">
</head>
<body>
    <!-- Navigation Section -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo-link">
                <img src="brand/Teasandcs Logo White.png" alt="Teas & C's Logo" class="logo animate-scaleIn">
            </a>
            
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link animate-fadeInRight delay-1">Home</a>
                <a href="index.html#opening-times" class="nav-link animate-fadeInRight delay-2">Opening Times</a>
                <a href="index.html#contact-info" class="nav-link animate-fadeInRight delay-3">Contact</a>
                <a href="index.html#our-story" class="nav-link animate-fadeInRight delay-4">About</a>
            </div>
            
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Menu Section -->
    <section class="terms-section">
        <div class="section-wrapper">
            <div class="terms-content animate-fadeInUp">
                <h1 class="animate-scaleIn delay-1">Our Menu</h1>
                <p class="last-updated animate-fadeInUp delay-2">We are always updating our menu with new and exciting drinks and food items. Please check back regularly to see what's new.</p>
                
                <!-- Loading indicator -->
                <div id="menuLoading" class="menu-loading">
                    <p>Loading menu...</p>
                </div>
                
                <!-- Error message -->
                <div id="menuError" class="menu-error" style="display: none;">
                    <p>Unable to load menu. Please try again later.</p>
                </div>
                
                <!-- Menu container -->
                <div id="menuContainer" class="menu-container" style="display: none;">
                    <!-- Drinks will be loaded here dynamically -->
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Component -->
    <div class="footer-placeholder"></div>

    <!-- Load Component System -->
    <script src="components.js"></script>
    
    <script>
        // Hamburger Menu Toggle
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        
        hamburger.addEventListener('click', function() {
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        });
        
        // Close menu when a nav link is clicked
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function() {
                navMenu.classList.remove('active');
                hamburger.classList.remove('active');
            });
        });

        // Smooth scrolling for navigation links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Scroll-triggered animations
        function animateOnScroll() {
            const elements = document.querySelectorAll('.animate-fadeInUp, .animate-fadeInLeft, .animate-fadeInRight, .animate-scaleIn');
            
            elements.forEach(element => {
                const elementTop = element.getBoundingClientRect().top;
                const elementVisible = 150;
                
                if (elementTop < window.innerHeight - elementVisible) {
                    element.style.opacity = '1';
                    element.style.transform = 'translateY(0) translateX(0) scale(1)';
                }
            });
        }

        // Initialize animations
        document.addEventListener('DOMContentLoaded', function() {
            const animatedElements = document.querySelectorAll('.animate-fadeInUp, .animate-fadeInLeft, .animate-fadeInRight, .animate-scaleIn');
            
            animatedElements.forEach(element => {
                element.style.opacity = '0';
                if (element.classList.contains('animate-fadeInUp')) {
                    element.style.transform = 'translateY(30px)';
                } else if (element.classList.contains('animate-fadeInLeft')) {
                    element.style.transform = 'translateX(-30px)';
                } else if (element.classList.contains('animate-fadeInRight')) {
                    element.style.transform = 'translateX(30px)';
                } else if (element.classList.contains('animate-scaleIn')) {
                    element.style.transform = 'scale(0.8)';
                }
                element.style.transition = 'all 0.8s ease-out';
            });

            // Run animation check
            animateOnScroll();
            
            // Load menu from database
            loadMenu();
        });

        // Run animation check on scroll
        window.addEventListener('scroll', animateOnScroll);

        // Load menu from database
        async function loadMenu() {
            const menuLoading = document.getElementById('menuLoading');
            const menuError = document.getElementById('menuError');
            const menuContainer = document.getElementById('menuContainer');

            try {
                const response = await fetch('get_drinks.php');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch menu');
                }

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error || 'Unknown error');
                }

                // Hide loading, show menu
                menuLoading.style.display = 'none';
                menuContainer.style.display = 'block';

                // Build menu HTML
                let menuHTML = '';
                
                for (const [category, drinks] of Object.entries(result.data)) {
                    menuHTML += `
                        <div class="menu-category">
                            <h2 class="category-title">${category}</h2>
                            <div class="drinks-grid">
                    `;

                    drinks.forEach(drink => {
                        menuHTML += `
                            <div class="drink-item">
                                <div class="drink-info">
                                    <h3 class="drink-name">${drink.name}</h3>
                                    ${drink.description ? `<p class="drink-description">${drink.description}</p>` : ''}
                                    ${drink.subcategory ? `<span class="drink-subcategory">${drink.subcategory}</span>` : ''}
                                </div>
                            </div>
                        `;
                    });

                    menuHTML += `
                            </div>
                        </div>
                    `;
                }

                menuContainer.innerHTML = menuHTML;

            } catch (error) {
                console.error('Error loading menu:', error);
                menuLoading.style.display = 'none';
                menuError.style.display = 'block';
                
                // Show detailed error for debugging
                if (error.message) {
                    const errorDetails = document.createElement('p');
                    errorDetails.style.fontSize = '14px';
                    errorDetails.style.marginTop = '10px';
                    errorDetails.textContent = 'Error: ' + error.message;
                    menuError.appendChild(errorDetails);
                }
            }
        }
    </script>
</body>
</html>
